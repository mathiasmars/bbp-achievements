<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Medal Voting</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --serif:'DM Serif Display',Georgia,serif;--sans:'DM Sans',system-ui,sans-serif;
  --ink:#18181a;--ink2:#56565a;--ink3:#9898a0;
  --page:#f7f6f2;--surface:#ffffff;--surface2:#f0efe9;
  --bd:rgba(0,0,0,0.1);--bd2:rgba(0,0,0,0.18);
  --gold-bg:#fff9e6;--gold-bd:#e6c56a;
  --silver-bg:#f4f4f4;--silver-bd:#b0b0b0;
  --bronze-bg:#fff2e8;--bronze-bd:#c47a3a;
  --ok-bg:#e8f5e0;--ok-tx:#2d6a0a;--ok-bd:#5a9e2a;
  --info-bg:#e8f0fb;--info-tx:#1a4fa0;--info-bd:#3a7ae0;
  --warn-bg:#fef3e0;--warn-tx:#7a4800;--warn-bd:#d08000;
  --err-bg:#fce8e8;--err-tx:#8a1a1a;--err-bd:#d04040;
  --rmd:8px;--rlg:14px;--shadow:0 2px 12px rgba(0,0,0,0.07);
}
@media(prefers-color-scheme:dark){:root{
  --ink:#f0efea;--ink2:#a8a8b0;--ink3:#606068;
  --page:#111113;--surface:#1c1c1f;--surface2:#242428;
  --bd:rgba(255,255,255,0.08);--bd2:rgba(255,255,255,0.15);
  --gold-bg:#2a2000;--gold-bd:#c8a020;--silver-bg:#202020;--silver-bd:#888;
  --bronze-bg:#200e00;--bronze-bd:#b06030;
  --ok-bg:#0f2200;--ok-tx:#90d060;--ok-bd:#4a8a1a;
  --info-bg:#001030;--info-tx:#80b8f8;--info-bd:#2858c0;
  --warn-bg:#200e00;--warn-tx:#f0b040;--warn-bd:#a06000;
  --err-bg:#200000;--err-tx:#f09090;--err-bd:#a02020;
  --shadow:0 2px 16px rgba(0,0,0,0.3);
}}
html{background:var(--page);min-height:100%;}
body{font-family:var(--sans);color:var(--ink);background:var(--page);min-height:100vh;}
.screen{display:none;max-width:640px;margin:0 auto;padding:2rem 1.25rem 4rem;}
.screen.active{display:block;}
.app-title{font-family:var(--serif);font-size:28px;font-weight:400;letter-spacing:-0.5px;margin-bottom:4px;}
.app-sub{font-size:14px;color:var(--ink2);margin-bottom:2rem;}
h2{font-family:var(--serif);font-size:22px;font-weight:400;margin-bottom:6px;}
h3{font-size:15px;font-weight:500;margin-bottom:8px;}
p{font-size:14px;color:var(--ink2);line-height:1.65;}
.pill{display:inline-block;padding:3px 10px;background:var(--surface2);border-radius:99px;font-size:11px;font-weight:500;color:var(--ink3);letter-spacing:.5px;text-transform:uppercase;margin-bottom:12px;}
.card{background:var(--surface);border:0.5px solid var(--bd);border-radius:var(--rlg);padding:1.125rem 1.25rem;margin-bottom:12px;box-shadow:var(--shadow);}
.card-info{border-color:var(--info-bd);background:var(--info-bg);}
.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 20px;border:0.5px solid var(--bd2);border-radius:var(--rmd);background:transparent;color:var(--ink);font-size:14px;font-weight:500;font-family:var(--sans);cursor:pointer;transition:all .15s;}
.btn:hover{background:var(--surface2);}
.btn:active{transform:scale(.98);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-p{background:var(--ink);color:var(--page);border-color:var(--ink);}
.btn-p:hover{opacity:.88;background:var(--ink);}
.btn-sm{padding:6px 14px;font-size:13px;}
.btn-d{color:var(--err-tx);border-color:var(--err-bd);}
.btn-d:hover{background:var(--err-bg);}
.btn-ex{color:var(--ok-tx);border-color:var(--ok-bd);}
.btn-ex:hover{background:var(--ok-bg);}
select,input[type=password]{width:100%;padding:10px 13px;border:0.5px solid var(--bd2);border-radius:var(--rmd);background:var(--surface);color:var(--ink);font-size:14px;font-family:var(--sans);outline:none;}
select:focus,input:focus{border-color:var(--ink);}
.lbl{font-size:13px;font-weight:500;color:var(--ink2);margin-bottom:5px;}
.emsg{color:var(--err-tx);font-size:13px;margin-top:6px;padding:8px 10px;background:var(--err-bg);border-radius:var(--rmd);border:0.5px solid var(--err-bd);display:none;}
.emsg.on{display:block;}
.hrow{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.sp{flex:1;}
.div{border:none;border-top:0.5px solid var(--bd);margin:1.5rem 0;}
.badge{display:inline-block;font-size:11px;padding:2px 9px;border-radius:99px;font-weight:500;}
.b-ok{background:var(--ok-bg);color:var(--ok-tx);}
.b-info{background:var(--info-bg);color:var(--info-tx);}
.b-warn{background:var(--warn-bg);color:var(--warn-tx);}
.b-dim{background:var(--surface2);color:var(--ink3);}
.pbar{height:4px;background:var(--surface2);border-radius:99px;overflow:hidden;margin:8px 0 4px;}
.pfill{height:100%;background:var(--ink);border-radius:99px;transition:width .35s;}
.ptext{font-size:12px;color:var(--ink3);}
.vrow{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:0.5px solid var(--bd);}
.vrow:last-child{border-bottom:none;}
.vname{flex:1;font-size:14px;font-weight:500;}
.vbtns{display:flex;gap:7px;}
.mbtn{position:relative;width:50px;height:40px;border-radius:var(--rmd);border:1px solid var(--bd2);background:var(--surface2);cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center;transition:all .15s;filter:grayscale(1) opacity(.3);}
.mbtn:hover:not(:disabled){filter:grayscale(.2) opacity(.75);background:var(--surface);}
.mbtn.on{filter:none;opacity:1;}
.mbtn.on.mg{border-color:var(--gold-bd);background:var(--gold-bg);}
.mbtn.on.ms{border-color:var(--silver-bd);background:var(--silver-bg);}
.mbtn.on.mb{border-color:var(--bronze-bd);background:var(--bronze-bg);}
.mbtn:disabled{cursor:not-allowed;filter:grayscale(1) opacity(.15);}
.mbtn .tip{display:none;position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:var(--ink);color:var(--page);font-size:11px;white-space:nowrap;padding:3px 8px;border-radius:5px;pointer-events:none;z-index:10;}
.mbtn:hover .tip{display:block;}
.rt{width:100%;border-collapse:collapse;font-size:13px;}
.rt th{text-align:left;padding:8px 10px;font-weight:500;color:var(--ink2);border-bottom:0.5px solid var(--bd);}
.rt td{padding:9px 10px;border-bottom:0.5px solid var(--bd);vertical-align:middle;}
.rt tr:last-child td{border-bottom:none;}
.rt tr.leader td{font-weight:500;}
.sbarw{display:flex;align-items:center;gap:7px;}
.sbar{height:5px;background:var(--surface2);border-radius:99px;overflow:hidden;width:70px;}
.sbarf{height:100%;background:var(--ink);border-radius:99px;}
.av{width:34px;height:34px;border-radius:50%;background:var(--info-bg);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;color:var(--info-tx);flex-shrink:0;border:0.5px solid var(--info-bd);}
.tie-box{margin-top:10px;padding:11px 13px;background:var(--warn-bg);border-radius:var(--rmd);border:0.5px solid var(--warn-bd);font-size:13px;color:var(--warn-tx);}
#toast{position:fixed;bottom:24px;right:24px;background:var(--ink);color:var(--page);padding:11px 20px;border-radius:var(--rmd);font-size:13px;font-family:var(--sans);opacity:0;transition:opacity .25s;pointer-events:none;z-index:999;box-shadow:0 4px 16px rgba(0,0,0,.2);}
.legend{display:flex;gap:16px;flex-wrap:wrap;font-size:13px;color:var(--ink2);margin-bottom:10px;}
#loading{position:fixed;inset:0;background:var(--page);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;z-index:9999;}
.spinner{width:28px;height:28px;border:2.5px solid var(--bd2);border-top-color:var(--ink);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.syncing{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--ink3);}
.sdot{width:6px;height:6px;border-radius:50%;background:var(--ink3);animation:pulse 1s ease infinite;}
@keyframes pulse{0%,100%{opacity:.3;}50%{opacity:1;}}
</style>
</head>
<body>
<div id="loading"><div class="spinner"></div><p style="font-size:14px;color:var(--ink3);">Loading…</p></div>
<div id="toast"></div>

<!-- IDENTITY -->
<div class="screen" id="s-id">
  <div id="id-hdr"></div>
  <div class="card">
    <div class="lbl">Select your name</div>
    <select id="vsel"><option value="">— Bitte auswählen —</option></select>
    <div class="emsg" id="id-err"></div>
  </div>
  <div class="hrow" style="margin-top:1rem;">
    <button class="btn btn-p" onclick="startVoting()">Los geht's!</button>
    <button class="btn btn-sm" onclick="goAdmin()">Admin</button>
  </div>
</div>

<!-- VOTING -->
<div class="screen" id="s-vote">
  <div style="margin-bottom:1.25rem;padding-top:.25rem;">
    <div class="pill" id="vstep"></div>
    <h2 id="vtitle"></h2>
    <div class="card card-info" style="margin-top:10px;margin-bottom:12px;">
      <div class="lbl">question</div>
      <div id="vq" style="font-size:15px;font-weight:500;color:var(--info-tx);"></div>
    </div>
    <div class="legend" id="vlegend"></div>
    <p id="vinstr"></p>
  </div>
  <div class="card" style="padding:.5rem 1.25rem;"><div id="vlist"></div></div>
  <div class="emsg" id="verr" style="margin-top:8px;"></div>
  <div class="hrow" style="margin-top:1rem;gap:8px;">
    <button class="btn" id="bprev" onclick="prevM()">← Zurück</button>
    <div class="sp"></div>
    <button class="btn btn-p" id="bnext" onclick="nextM()">Weiter →</button>
  </div>
  <div style="margin-top:1.25rem;">
    <div class="pbar"><div class="pfill" id="vprog"></div></div>
    <div class="ptext" id="vplbl"></div>
  </div>
</div>

<!-- SUBMITTING -->
<div class="screen" id="s-sub">
  <div style="text-align:center;padding-top:3rem;">
    <div style="font-size:40px;margin-bottom:1rem;">⏳</div>
    <h2>Submitting your votes…</h2>
    <p style="margin-top:8px;">Saving to Google Sheets, please wait.</p>
  </div>
</div>

<!-- DONE -->
<div class="screen" id="s-done">
  <div style="text-align:center;padding-top:1.5rem;">
    <div style="font-size:56px;margin:1.5rem 0 1rem;">🏅</div>
    <h2 id="done-h"></h2>
    <p id="done-p" style="margin-top:8px;max-width:340px;margin-left:auto;margin-right:auto;"></p>
    <button class="btn btn-sm" style="margin-top:1.75rem;" onclick="window.close();">Schließen</button>
  </div>
</div>

<!-- ADMIN LOGIN -->
<div class="screen" id="s-alog">
  <div style="margin-bottom:1.5rem;padding-top:.25rem;">
    <div class="pill">admin</div>
    <h2>Dashboard access</h2>
    <p>Enter the admin password to view scores and manage rounds.</p>
  </div>
  <div class="card">
    <div class="lbl">Password</div>
    <input type="password" id="apw" placeholder="Enter password" onkeydown="if(event.key==='Enter')chkAdmin()"/>
    <div class="emsg" id="a-err"></div>
  </div>
  <div class="hrow" style="margin-top:1rem;">
    <button class="btn btn-p" onclick="chkAdmin()">Enter</button>
    <button class="btn btn-sm" onclick="show('s-id')">Cancel</button>
  </div>
</div>

<!-- ADMIN DASHBOARD -->
<div class="screen" id="s-admin">
  <div style="margin-bottom:1.25rem;padding-top:.25rem;">
    <div class="hrow">
      <div><div class="pill">admin</div><h2 id="adm-h"></h2></div>
      <div class="sp"></div>
      <button class="btn btn-sm btn-ex" onclick="exportCSV()">Export CSV</button>
      <button class="btn btn-sm btn-d" onclick="resetAll()">Reset all</button>
    </div>
    <div style="margin-top:8px;" id="sync-status"></div>
  </div>
  <div class="card" id="a-status"></div>
  <hr class="div"/>
  <h3 id="adm-rh" style="margin-bottom:6px;"></h3>
  <p id="adm-ri" style="margin-bottom:1rem;"></p>
  <div id="a-rounds"></div>
  <hr class="div"/>
  <h3 id="adm-fh" style="margin-bottom:1rem;"></h3>
  <div id="a-final"></div>
  <div style="margin-top:1.75rem;display:flex;gap:8px;flex-wrap:wrap;">
    <button class="btn btn-sm" onclick="refreshAdmin()">↻ Refresh</button>
    <button class="btn btn-sm" onclick="show('s-id')">Exit admin</button>
  </div>
</div>

<script>
let CFG=null, voter=null, midx=0, vts={}, shuffledMedals=[];
let rVotes={}, rVoters=[], rAssigns={};

// ─── API (GET only — avoids CORS issues with Google Apps Script) ──────────────
async function api(action, data){
  const url=CFG.app.apiUrl;
  if(!url||url==='PASTE_YOUR_WEB_APP_URL_HERE') throw new Error('API URL not set in app.json');
  const encoded=encodeURIComponent(JSON.stringify(data||{}));
  const r=await fetch(`${url}?action=${action}&data=${encoded}`);
  return r.json();
}
async function apiGet(action){ return api(action); }

async function boot(){
  try{ const r=await fetch('helper/53/misc/app.json'); CFG=await r.json(); }
  catch(e){ CFG=fallbackCfg(); }
  applyConfig();
  try{
    const vd=await apiGet('getVotes'); rVoters=vd.voters||[]; rVotes=vd.votes||{};
    const ad=await apiGet('getAssignments'); rAssigns=ad.assigns||{};
  }catch(e){ console.warn('API unreachable:',e.message); }
  initSel();
  document.getElementById('loading').style.display='none';
  show('s-id');
}

function fallbackCfg(){
  return{
    app:{title:'Team Medal Voting',subtitle:'Rate your peers for each category',adminPassword:'admin2024',apiUrl:'PASTE_YOUR_WEB_APP_URL_HERE'},
    ui:{
      startScreen:{heading:'Who are you?',instruction:'Select your name to begin.'},
      voteScreen:{instruction:'Assign exactly one 🥇 gold, one 🥈 silver, and one 🥉 bronze to three different people. You cannot vote for yourself.',goldLabel:'Gold — definitiv',silverLabel:'Silber — gute Performance',bronzeLabel:'Bronze — starker Kandidat',blockMessage:'Du musst Gold, Silber UND Bronze vergeben bevor du weiter kannst.',nextButton:'Weiter →',submitButton:'Abstimmen'},
      doneScreen:{heading:'Votes submitted!',message:'Your scores have been recorded.'},
      adminScreen:{heading:'Results Dashboard',roundsHeading:'Round results',roundsInstruction:'Highest average score wins the medal and is removed from future rounds.',finalHeading:'Final assignments'}
    },
    people:['Alex','Berni','Daniel F.','Daniel M.','Danny','Marcus','Mathias','Michi','Thomas'],
    medals:Array.from({length:9},(_,i)=>({id:i,name:`Medal ${i+1}`,question:`Question ${i+1}`}))
  };
}

function applyConfig(){
  const u=CFG.ui;
  document.title=CFG.app.title;
  document.getElementById('id-hdr').innerHTML=`<div class="pill">voting</div><div class="app-title">${CFG.app.title}</div><div class="app-sub">${CFG.app.subtitle}</div>`;
  document.getElementById('vlegend').innerHTML=`<span>🥇 ${u.voteScreen.goldLabel}</span><span>🥈 ${u.voteScreen.silverLabel}</span><span>🥉 ${u.voteScreen.bronzeLabel}</span>`;
  document.getElementById('vinstr').textContent=u.voteScreen.instruction;
  document.getElementById('done-h').textContent=u.doneScreen.heading;
  document.getElementById('done-p').textContent=u.doneScreen.message;
  document.getElementById('adm-h').textContent=u.adminScreen.heading;
  document.getElementById('adm-rh').textContent=u.adminScreen.roundsHeading;
  document.getElementById('adm-ri').textContent=u.adminScreen.roundsInstruction;
  document.getElementById('adm-fh').textContent=u.adminScreen.finalHeading;
}

function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.style.opacity='1';setTimeout(()=>t.style.opacity='0',2800);}
function se(id,m){const e=document.getElementById(id);e.textContent=m;e.classList.add('on');}
function he(id){document.getElementById(id).classList.remove('on');}
function ini(name){return name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();}
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function actM(){const s=new Set(Object.keys(rAssigns).map(Number));return shuffledMedals.length?shuffledMedals.filter(m=>!s.has(m.id)):CFG.medals.filter(m=>!s.has(m.id));}
function actP(){const ap=Object.values(rAssigns).map(a=>a.person);return CFG.people.filter(p=>!ap.includes(p));}

function initSel(){
  const sel=document.getElementById('vsel');
  sel.innerHTML='<option value="">— Bitte auswählen —</option>';
  CFG.people.forEach(p=>{const o=document.createElement('option');o.value=p;o.textContent=p+(rVoters.includes(p)?' ✓ voted':'');sel.appendChild(o);});
}

async function startVoting(){
  const v=document.getElementById('vsel').value;
  if(!v){se('id-err','Bitte wähle deinen Namen aus.');return;}
  if(rVoters.includes(v)){se('id-err','Du hast bereits abgestimmt.');return;}
  he('id-err');
  voter=v;vts={};midx=0;
  shuffledMedals=shuffle(CFG.medals.filter(m=>!new Set(Object.keys(rAssigns).map(Number)).has(m.id)));
  actM().forEach(m=>{vts[m.id]={};actP().filter(p=>p!==v).forEach(p=>vts[m.id][p]=0);});
  renderV();show('s-vote');
}

function renderV(){
  const am=actM();
  if(midx>=am.length){submitV();return;}
  const med=am[midx],u=CFG.ui.voteScreen;
  document.getElementById('vstep').textContent=`Kategorie ${midx+1} von ${am.length}`;
  document.getElementById('vtitle').textContent=med.name;
  document.getElementById('vq').textContent=med.question;
  he('verr');
  const ppl=actP().filter(p=>p!==voter),mi=med.id;
  if(!vts[mi]){vts[mi]={};ppl.forEach(p=>vts[mi][p]=0);}
  const tb={3:null,2:null,1:null};
  ppl.forEach(p=>{const pts=vts[mi][p]||0;if(pts>0)tb[pts]=p;});
  const lst=document.getElementById('vlist');lst.innerHTML='';
  ppl.forEach(person=>{
    const cur=vts[mi][person]||0;
    const btns=[{pts:3,cls:'mg',em:'🥇',tip:u.goldLabel},{pts:2,cls:'ms',em:'🥈',tip:u.silverLabel},{pts:1,cls:'mb',em:'🥉',tip:u.bronzeLabel}]
      .map(t=>{const tbo=tb[t.pts]&&tb[t.pts]!==person;
        return `<button class="mbtn ${t.cls}${cur===t.pts?' on':''}" data-pts="${t.pts}" ${tbo?`disabled title="Vergeben an ${tb[t.pts]}"`:''} onclick="setPts(${mi},'${person}',${t.pts},this)"><span class="tip">${t.tip}</span>${t.em}</button>`;
      }).join('');
    const row=document.createElement('div');row.className='vrow';
    row.innerHTML=`<div class="vname">${person}</div><div class="vbtns">${btns}</div>`;
    lst.appendChild(row);
  });
  const pct=Math.round((midx/am.length)*100);
  document.getElementById('vprog').style.width=pct+'%';
  document.getElementById('vplbl').textContent=`${midx} von ${am.length} Kategorien bewertet`;
  document.getElementById('bprev').style.visibility=midx===0?'hidden':'visible';
  document.getElementById('bnext').textContent=midx===am.length-1?u.submitButton:u.nextButton;
}

function setPts(mi,person,pts,btn){
  const cur=vts[mi][person]||0,nv=cur===pts?0:pts;
  if(nv>0)Object.keys(vts[mi]).forEach(p=>{if(vts[mi][p]===nv)vts[mi][p]=0;});
  vts[mi][person]=nv;renderV();
}

function valM(){
  const am=actM();if(midx>=am.length)return true;
  const pts=Object.values(vts[am[midx].id]||{});
  return pts.includes(3)&&pts.includes(2)&&pts.includes(1);
}

function nextM(){
  if(!valM()){se('verr',CFG.ui.voteScreen.blockMessage);return;}
  he('verr');const am=actM();
  if(midx<am.length-1){midx++;renderV();}else submitV();
}
function prevM(){if(midx>0){he('verr');midx--;renderV();}}

async function submitV(){
  const am=actM();
  for(let i=0;i<am.length;i++){
    const pts=Object.values(vts[am[i].id]||{});
    if(!pts.includes(3)||!pts.includes(2)||!pts.includes(1)){midx=i;renderV();se('verr',CFG.ui.voteScreen.blockMessage);return;}
  }
  show('s-sub');
  try{
    const r=await api('submitVotes',{voter,votes:vts});
    if(r.error==='already_voted'){show('s-vote');se('verr','Du hast bereits von einem anderen Gerät abgestimmt.');return;}
    rVoters.push(voter);show('s-done');
  }catch(e){show('s-vote');se('verr','Speichern fehlgeschlagen: '+e.message);}
}

function goHome(){initSel();show('s-id');}
function goAdmin(){document.getElementById('apw').value='';he('a-err');show('s-alog');}
async function chkAdmin(){
  if(document.getElementById('apw').value!==CFG.app.adminPassword){se('a-err','Falsches Passwort.');return;}
  show('s-admin');await refreshAdmin();
}

async function refreshAdmin(){
  document.getElementById('sync-status').innerHTML=`<span class="syncing"><span class="sdot"></span> Lade Daten aus Google Sheets…</span>`;
  try{
    const vd=await apiGet('getVotes');rVotes=vd.votes||{};rVoters=vd.voters||[];
    const ad=await apiGet('getAssignments');rAssigns=ad.assigns||{};
    document.getElementById('sync-status').innerHTML=`<span style="font-size:12px;color:var(--ok-tx);">✓ Aktualisiert — ${new Date().toLocaleTimeString()}</span>`;
  }catch(e){
    document.getElementById('sync-status').innerHTML=`<span style="font-size:12px;color:var(--err-tx);">⚠ Google Sheets nicht erreichbar: ${e.message}</span>`;
  }
  renderAdmin();
}

function calcScores(medalId){
  const apl=Object.values(rAssigns).map(a=>a.person);
  const elig=CFG.people.filter(p=>!apl.includes(p));
  return elig.map(person=>{
    let tot=0;
    Object.entries(rVotes).forEach(([v,mv])=>{if(v===person)return;tot+=(mv[medalId]||{})[person]||0;});
    const vc=Object.keys(rVotes).filter(v=>v!==person).length;
    return{person,tot,vc,avg:vc>0?tot/vc:0};
  }).sort((a,b)=>b.avg-a.avg);
}

function micon(a){if(a>=2.5)return'🥇';if(a>=1.5)return'🥈';if(a>0)return'🥉';return'—';}

function renderAdmin(){
  const voted=rVoters;
  document.getElementById('a-status').innerHTML=`
    <div class="hrow" style="margin-bottom:10px;">
      <h3 style="margin:0;">Abstimmungsfortschritt</h3><div class="sp"></div>
      <span class="badge ${voted.length===CFG.people.length?'b-ok':'b-warn'}">${voted.length} / ${CFG.people.length} abgestimmt</span>
    </div>
    <div style="display:flex;flex-wrap:wrap;gap:6px;">
      ${CFG.people.map(p=>`<span class="badge ${voted.includes(p)?'b-ok':'b-dim'}">${p}</span>`).join('')}
    </div>`;

  const re=document.getElementById('a-rounds');re.innerHTML='';
  const aidx=new Set(Object.keys(rAssigns).map(Number));
  CFG.medals.forEach(med=>{
    if(aidx.has(med.id))return;
    const sc=calcScores(med.id);
    const tied=sc.length>1&&sc[0].avg>0&&sc[0].avg===sc[1].avg;
    const card=document.createElement('div');card.className='card';
    card.innerHTML=`
      <div class="hrow" style="margin-bottom:10px;">
        <h3 style="margin:0;">${med.name}</h3>
        <span class="badge b-info" style="font-size:11px;">${med.question}</span>
        ${tied?`<span class="badge b-warn">Gleichstand</span>`:''}
      </div>
      <table class="rt">
        <thead><tr><th>Person</th><th>Punkte gesamt</th><th>Ø pro Voter</th><th></th></tr></thead>
        <tbody>${sc.map(({person,tot,vc,avg},i)=>`
          <tr class="${i===0&&avg>0?'leader':''}">
            <td>${person}</td>
            <td>${tot} Pkt <span style="font-size:11px;color:var(--ink3);">(${vc} Votes)</span></td>
            <td><div class="sbarw"><span>${micon(avg)}</span><div class="sbar"><div class="sbarf" style="width:${Math.round((avg/3)*100)}%"></div></div><span>${avg.toFixed(2)}</span></div></td>
            <td>${i===0&&avg>0&&!tied?`<button class="btn btn-sm" onclick="doAssign(${med.id},'${person}','${avg.toFixed(2)}','${med.name}')">Zuweisen →</button>`:''}</td>
          </tr>`).join('')}
        </tbody>
      </table>
      ${tied?`<div class="tie-box">Gleichstand zwischen <strong>${sc.filter(s=>s.avg===sc[0].avg).map(s=>s.person).join(' und ')}</strong>. Tiebreaker: konkretes Beispiel der letzten 3 Monate für <em>"${med.question}"</em>.<div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;">${sc.filter(s=>s.avg===sc[0].avg).map(({person,avg})=>`<button class="btn btn-sm" onclick="doAssign(${med.id},'${person}','${avg.toFixed(2)}','${med.name}')">Zuweisen an ${person}</button>`).join('')}</div></div>`:``}`;
    re.appendChild(card);
  });
  if(!re.innerHTML)re.innerHTML='<p>Alle Medaillen wurden vergeben.</p>';

  const fe=Object.entries(rAssigns);
  document.getElementById('a-final').innerHTML=fe.length===0
    ?'<p style="color:var(--ink3);">Noch keine Medaillen vergeben.</p>'
    :`<table class="rt"><thead><tr><th>Person</th><th>Medaille</th><th>Ø Score</th><th>Frage</th></tr></thead><tbody>
      ${fe.map(([mi,a])=>{const med=CFG.medals.find(m=>m.id===parseInt(mi));return`<tr>
        <td><div class="hrow" style="gap:8px;"><div class="av">${ini(a.person)}</div>${a.person}</div></td>
        <td><span class="badge b-ok">${a.medalName||med?.name||''}</span></td>
        <td>${micon(parseFloat(a.avg))} ${a.avg} / 3.00</td>
        <td style="color:var(--ink2);">${med?.question||''}</td>
      </tr>`;}).join('')}</tbody></table>`;
}

async function doAssign(mi,person,avg,medalName){
  const btn=event.target;btn.disabled=true;btn.textContent='Speichern…';
  try{
    await api('assignMedal',{medalId:mi,medalName,person,avg});
    rAssigns[mi]={person,avg,medalName,assignedAt:new Date().toISOString()};
    toast(`${person} → ${medalName}`);renderAdmin();
  }catch(e){btn.disabled=false;btn.textContent='Zuweisen →';toast('Fehler: '+e.message);}
}

function exportCSV(){
  const lines=['Medal Voting Export — '+CFG.app.title,'Exported at,'+new Date().toLocaleString(),'','FINAL ASSIGNMENTS','Person,Medal,Question,Avg Score,Assigned At'];
  Object.entries(rAssigns).forEach(([mi,a])=>{const med=CFG.medals.find(m=>m.id===parseInt(mi));lines.push([a.person,a.medalName||'',med?.question||'',a.avg,a.assignedAt].join(','));});
  lines.push('','RAW VOTES',['Voter',...CFG.medals.map(m=>m.name+' — '+m.question)].join(','));
  Object.entries(rVotes).forEach(([v,mv])=>{
    const row=[v];
    CFG.medals.forEach(med=>{const m=mv[med.id]||{};const parts=Object.entries(m).filter(([,p])=>p>0).sort((a,b)=>b[1]-a[1]).map(([p,pts])=>`${p}:${pts===3?'Gold':pts===2?'Silber':'Bronze'}`);row.push('"'+parts.join('; ')+'"');});
    lines.push(row.join(','));
  });
  lines.push('','SCORES PER MEDAL');
  CFG.medals.forEach(med=>{
    lines.push(med.name+' — '+med.question,'Person,Total pts,Voters,Avg score');
    calcScores(med.id).forEach(({person,tot,vc,avg})=>lines.push([person,tot,vc,avg.toFixed(2)].join(',')));
    lines.push('');
  });
  const blob=new Blob([lines.join('\n')],{type:'text/csv'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='medal-voting-results.csv';a.click();
  URL.revokeObjectURL(url);toast('CSV exportiert!');
}

async function resetAll(){
  if(!confirm('Alle Stimmen und Zuweisungen in Google Sheets zurücksetzen? Dies kann nicht rückgängig gemacht werden.'))return;
  try{await api('resetAll',{});rVotes={};rVoters=[];rAssigns={};toast('Alle Daten zurückgesetzt.');renderAdmin();initSel();}
  catch(e){toast('Fehler: '+e.message);}
}

boot();
</script>
